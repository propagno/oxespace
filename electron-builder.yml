appId: com.oxespace.app
productName: OXESpace
directories:
  output: dist
# Update feed for electron-updater (and where `electron-builder --publish`
# uploads). The app reads GitHub Releases for `latest.yml` + the installer.
publish:
  provider: github
  owner: propagno
  repo: oxespace
files:
  - out/**/*
  - package.json
  - from: electron/main/db/migrations
    to: out/main/migrations
  # Dead weight: transformers.js download cache (MiniLM / e5-base leftovers).
  # The shipped model is resources/models → multilingual-e5-small only.
  - "!**/node_modules/@xenova/transformers/.cache/**"
  # Windows x64 product — drop ONNX native binaries for other OS/arch.
  - "!**/node_modules/onnxruntime-node/bin/napi-v3/darwin/**"
  - "!**/node_modules/onnxruntime-node/bin/napi-v3/linux/**"
  - "!**/node_modules/onnxruntime-node/bin/napi-v3/win32/arm64/**"
extraResources:
  - from: resources/icon.ico
    to: icon.ico
  # Internal MCP bridge spawned by agent CLIs at runtime — must be on disk
  # next to the packaged app so .mcp.json's `args: ["<absolute path>"]`
  # resolves whether the user runs the installed build or a portable copy.
  - from: resources/mcp-bridge
    to: mcp-bridge
  # OXEVoice engine — bundled whisper.cpp CLI spawned at runtime by
  # voice.service.ts. Lands at <resourcesPath>/whisper/whisper-cli.exe.
  - from: resources/whisper/win-x64
    to: whisper
  # Semantic search model (multilingual-e5-small) bundled so it loads OFFLINE —
  # no huggingface.co download at runtime (fails on locked-down networks). Lands
  # at <resourcesPath>/models/Xenova/multilingual-e5-small/. Populated at build
  # time by `npm run prepare:model` (scripts/fetch-semantic-model.mjs).
  - from: resources/models
    to: models
asar: true
asarUnpack:
  - node_modules/better-sqlite3/**/*
  - node_modules/node-pty/**/*
  # Semantic search worker loads the ONNX runtime native binding through
  # @xenova/transformers; native .node files cannot be loaded from inside the
  # asar archive, so they must stay unpacked on disk.
  # (.cache is already excluded via files filters + scripts/slim-pack-deps.mjs)
  - node_modules/@xenova/transformers/**/*
  - node_modules/onnxruntime-node/**/*
  - node_modules/sharp/**/*
  # CodeGraph parses with web-tree-sitter (wasm). The parse worker reads these
  # as real files, which is impossible from inside the asar — keep them unpacked.
  - node_modules/web-tree-sitter/**/*
  - node_modules/tree-sitter-wasms/**/*
win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: OXESpace-${version}-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
