name: Release

on:
  push:
    tags:
      - "v*.*.*"

# GitHub is removing the Node 20 runtime that JS actions run on. Force any
# action still pinned to Node 20 (e.g. softprops/action-gh-release@v2) onto
# Node 24 so the release keeps working past the deprecation deadline.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Build installer
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          npm run typecheck
          npm run test
          npm run build

      - name: Rebuild native modules for Electron
        run: npm run rebuild:native

      - name: Build NSIS installer
        run: npm run dist -- --win nsis --publish never

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # Include latest.yml + .blockmap so electron-updater can detect and
          # diff-download new versions — without them auto-update can't work.
          files: |
            dist/OXESpace-*.exe
            dist/latest.yml
            dist/*.blockmap
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
