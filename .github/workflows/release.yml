# DEPRECATED: release is part of the unified "CI and Release" workflow
# (.github/workflows/ci.yml). This file only redirects manual runs so old
# bookmarks / scripts that target "Release" still work.

name: Release (redirect)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Optional release tag (vX.Y.Z). Empty = v{package.json version}
        required: false
        type: string

permissions:
  contents: read
  actions: write

jobs:
  redirect:
    name: Forward to CI and Release
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch unified pipeline with publish_release=true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Use the branch selected in "Use workflow from" for this redirect run.
          BRANCH='${{ github.ref_name }}'
          args=(
            workflow run ci.yml
            --ref "$BRANCH"
            -f "publish_release=true"
          )
          if [ -n "${{ inputs.tag }}" ]; then
            args+=(-f "tag=${{ inputs.tag }}")
          fi
          gh "${args[@]}"
          echo "Dispatched unified CI and Release for branch=$BRANCH publish_release=true"
